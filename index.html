<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Везде Везем — Международные перевозки</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --wa-green: #25D366;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        .header {
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: -30px auto 40px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.5rem; }
        .services {
            text-align: left;
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }
        .services li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .services li::before {
            content: "✓";
            color: var(--success);
            margin-right: 10px;
            font-weight: bold;
        }
        .manager-card {
            background: #eef4ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            width: 100%;
            font-size: 1.1rem;
            transition: transform 0.2s;
            cursor: pointer;
        }
