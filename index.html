    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #161616; --text: #e0e0e0; --accent: #b22222; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: var(--text); line-height: 1.6; }
        
        /* КРУГЛЫЕ КНОПКИ СБОКУ */
        .side-chats {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .round-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }
        .round-btn:hover { transform: scale(1.1); }
        .btn-wa { background: #25d366; }
        .btn-jivo { background: #007bff; } /* Синяя круглая кнопка чата */
        .round-icon { width: 32px; height: 32px; fill: white; }

        header { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=1500'); 
            background-size: cover; background-position: center; 
            padding: 50px 20px; text-align: center; border-bottom: 3px solid var(--gold);
        }

        .container { width: 95%; max-width: 1100px; margin: auto; padding: 15px 0; }
        .badge { background: var(--gold); color: #000; padding: 5px 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; border-radius: 3px; }
        h1 { font-size: 2.5rem; color: var(--gold); margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .manager-card { 
            background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid var(--gold); 
            padding: 30px; text-align: center; margin: 30px 0; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }
        .contact-btn { 
            display: block; width: 100%; max-width: 320px; margin: 10px auto; 
            padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; text-align: center; border: none; cursor: pointer; font-size: 1rem;
        }
        .call-btn { background: #ffffff; color: #000; }
        .wa-btn { background: #25d366; color: white; }
        .jivo-btn { background: var(--gold); color: black; }
        .tg-btn { background: #0088cc; color: white; }
    </style>
