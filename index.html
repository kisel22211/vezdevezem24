        html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; background: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .header { background: #0a0a0a; padding: 30px 10px; text-align: center; border-bottom: 2px solid #d4af37; }
        .gold { color: #d4af37; }
        .content { padding: 15px; max-width: 500px; margin: 0 auto; }
        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .info-box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; font-size: 14px; text-align: center; }
        .card { background: #080808; border: 2px solid #d4af37; border-radius: 20px; padding: 30px 20px; text-align: center; }
        .btn { display: block; padding: 18px 0; margin: 15px 0; border-radius: 40px; text-decoration: none; font-weight: bold; font-size: 18px; border: none; cursor: pointer; transition: 0.2s; text-align: center; width: 100%; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-call { background: #fff; color: #000; }
        .btn-jivo { background: #d4af37; color: #000; box-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .btn-wa { background: #25d366; color: #fff; }
        .btn-tg { background: #0088cc; color: #fff; }
        .side-btns { position: fixed; top: 15px; right: 15px; z-index: 1000; }
        .circle { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: none; cursor: pointer; }
    </style>
    
    <script src="https://code.jivosite.com/widget/S7z82mG7rT" async></script>

    <script>
        // УЛЬТРА-ФУНКЦИЯ ДЛЯ ОТКРЫТИЯ ЧАТА
        function forceOpenJivo() {
            // Способ 1: Прямой вызов через API
            if (window.jivo_api && window.jivo_api.open) {
                window.jivo_api.open();
                return;
            }
            // Способ 2: Вызов через глобальный объект Jivo
            if (window.Jivo && window.Jivo.open) {
                window.Jivo.open();
                return;
            }
            // Способ 3: Имитация нажатия на синий кружок (если он есть)
            var jivoNode = document.querySelector('jdiv') || document.querySelector('.jivo-iframe-container');
            if (jivoNode) {
                alert("Чат почти загружен, нажимаю за вас...");
            } else {
                alert("Чат загружается (3-5 сек). Попробуйте нажать еще раз через мгновение!");
            }
        }
    </script>
</head>
